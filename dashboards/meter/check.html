<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Utility Reconciliation Analysis</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap");
            body {
                font-family: "Inter", sans-serif;
                background-color: #f8fafc;
                margin: 0;
                padding: 0;
            }
            #main-chart {
                height: 600px;
                width: 100%;
            }

            /* Branding Variables */
            :root {
                --brand-bg: #404068;
                --brand-accent: #faa919;
            }

            .btn-toggle {
                transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .active-toggle {
                background-color: var(--brand-bg) !important;
                color: var(--brand-accent) !important;
                box-shadow: 0 4px 12px rgba(64, 64, 104, 0.2);
            }
            .header-brand {
                background-color: var(--brand-bg);
                color: var(--brand-accent);
                /* Round top corners as requested */
                border-top-left-radius: 1rem;
                border-top-right-radius: 1rem;
            }

            /* Scrollbar styling */
            ::-webkit-scrollbar {
                width: 6px;
                height: 6px;
            }
            ::-webkit-scrollbar-track {
                background: #f1f5f9;
            }
            ::-webkit-scrollbar-thumb {
                background: #cbd5e1;
                border-radius: 10px;
            }
            ::-webkit-scrollbar-thumb:hover {
                background: #94a3b8;
            }

            .table-container {
                max-height: 500px;
                overflow-y: auto;
            }
        </style>
    </head>
    <body class="text-slate-800 p-2 md:p-4">
        <!-- Added padding to body to show rounded corners of header -->

        <!-- Header -->
        <nav
            class="header-brand border-b border-slate-700 px-8 py-3 flex flex-wrap justify-between items-center sticky top-0 z-50 gap-4 shadow-lg"
        >
            <div class="flex items-center gap-6">
                <!-- Brand -->
                <div
                    class="flex items-center gap-3 pr-6 border-r border-white/10"
                >
                    <div class="bg-white/10 p-2 rounded-lg">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            class="h-5 w-5"
                            viewBox="0 0 20 20"
                            fill="currentColor"
                        >
                            <path
                                fill-rule="evenodd"
                                d="M3 3a1 1 0 000 2v8a2 2 0 002 2h2.586l-1.293 1.293a1 1 0 101.414 1.414L10 15.414l2.293 2.293a1 1 0 001.414-1.414L12.414 15H15a2 2 0 002-2V5a1 1 0 100-2H3zm11 4a1 1 0 10-2 0v4a1 1 0 102 0V7zm-3 1a1 1 0 10-2 0v3a1 1 0 102 0V8zM8 9a1 1 0 00-2 0v2a1 1 0 102 0V9z"
                                clip-rule="evenodd"
                            />
                        </svg>
                    </div>
                    <h1 class="text-lg font-black tracking-tight">
                        Utility<span class="opacity-80">Recon</span>
                    </h1>
                </div>

                <!-- Utility Meta Info -->
                <div class="flex items-center gap-8">
                    <!-- Meter Number -->
                    <div class="flex flex-col">
                        <span
                            class="text-[9px] font-black uppercase tracking-widest text-white/40"
                            >Meter Number</span
                        >
                        <span class="text-sm font-bold text-white"
                            >#MT-8849201-X</span
                        >
                    </div>

                    <!-- Utility Type -->
                    <div class="flex flex-col">
                        <span
                            class="text-[9px] font-black uppercase tracking-widest text-white/40"
                            >Utility Type</span
                        >
                        <div class="flex items-center gap-2">
                            <!-- Electricity Icon -->
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                class="h-4 w-4 text-amber-400"
                                fill="none"
                                viewBox="0 0 24 24"
                                stroke="currentColor"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    stroke-width="2"
                                    d="M13 10V3L4 14h7v7l9-11h-7z"
                                />
                            </svg>
                            <span class="text-sm font-bold text-white"
                                >Electricity</span

                        </div>
                    </div>

                    <!-- Meters Checked -->
                    <div class="flex flex-col">
                        <span
                            class="text-[9px] font-black uppercase tracking-widest text-white/40"
                            >Meters Checked</span
                        >
                        <span class="text-sm font-bold text-white"

                            <span class="text-[10px] font-medium opacity-50"

                            ></span

                </div>
            </div>

            <!-- Right side placeholder (Empty as icon was removed) -->
            <div class="hidden md:block"></div>
        </nav>

        <main class="max-w-7xl mx-auto py-6 space-y-6">
            <!-- Controls & Metrics -->
            <div class="flex flex-col lg:flex-row gap-6">
                <!-- Time Switcher & Breadcrumb -->
                <div class="flex flex-col gap-3">
                    <div

                    >
                        <button
                            onclick="updateView('monthly')"
                            id="btn-monthly"
                            class="btn-toggle active-toggle px-6 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider"
                        >
                            Monthly
                        </button>
                        <button
                            onclick="updateView('daily')"
                            id="btn-daily"
                            class="btn-toggle px-6 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider text-slate-400 hover:text-slate-600"
                        >
                            Daily
                        </button>
                        <button
                            onclick="updateView('hourly')"
                            id="btn-hourly"
                            class="btn-toggle px-6 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider text-slate-400 hover:text-slate-600"
                        >
                            Hourly
                        </button>
                    </div>
                    <div id="breadcrumb-container" class="px-2 hidden">
                        <button
                            onclick="goBack()"
                            class="flex items-center gap-2 text-[#404068] hover:opacity-80 transition-colors"
                        >
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                class="h-4 w-4"
                                fill="none"
                                viewBox="0 0 24 24"
                                stroke="currentColor"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    stroke-width="2"
                                    d="M10 19l-7-7m0 0l7-7m-7 7h18"
                                />
                            </svg>
                            <span
                                class="text-xs font-black uppercase tracking-widest"
                                id="breadcrumb-text"
                                >Back to Months</span
                            >
                        </button>
                    </div>
                </div>

                <!-- Summary Cards -->
                <div class="flex-1 grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div
                        class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm"
                    >
                        <p
                            class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1"
                        >
                            Total Check
                        </p>
                        <div class="flex items-baseline gap-1">
                            <h3
                                class="text-2xl font-black text-slate-900"
                                id="stat-ref"
                            >
                                0
                            </h3>
                            <span class="text-xs font-bold text-slate-400"
                                >kWh</span
                            >
                        </div>
                    </div>
                    <div
                        class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm border-l-4 border-l-[#404068]"
                    >
                        <p
                            class="text-[10px] font-black text-[#404068] uppercase tracking-widest mb-1"
                        >
                            Total Checked
                        </p>
                        <div class="flex items-baseline gap-1">
                            <h3
                                class="text-2xl font-black text-slate-900"
                                id="stat-load"
                            >
                                0
                            </h3>
                            <span class="text-xs font-bold text-slate-400"
                                >kWh</span
                            >
                        </div>
                    </div>
                    <div
                        class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm border-l-4 border-l-emerald-500"
                    >
                        <p
                            class="text-[10px] font-black text-emerald-500 uppercase tracking-widest mb-1"
                        >
                            Avg Recovery
                        </p>
                        <div class="flex items-baseline gap-1">
                            <h3
                                class="text-2xl font-black text-emerald-600"
                                id="stat-rate"
                            >
                                0%
                            </h3>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Chart Area -->
            <div
                class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden relative"
            >
                <div
                    class="px-8 py-6 border-b border-slate-100 flex flex-col md:flex-row justify-between items-center"
                >
                    <div class="mb-4 md:mb-0">
                        <h2
                            class="text-lg font-black text-slate-900 tracking-tight"
                            id="chart-title"
                        >
                            Check vs. Checked Comparison
                        </h2>
                        <p
                            class="text-xs text-slate-400 font-medium"
                            id="chart-subtitle"
                        >
                            Click bars to drill down
                        </p>
                    </div>

                    <div class="flex flex-wrap items-center gap-4">
                        <!-- Legend -->
                        <div class="hidden sm:flex items-center gap-4 mr-4">
                            <div
                                class="flex items-center gap-1.5 text-[10px] font-black text-slate-400 uppercase"
                            >
                                <span
                                    class="w-3 h-3 bg-slate-200 rounded-sm"
                                ></span>
                                Check
                            </div>
                            <div
                                class="flex items-center gap-1.5 text-[10px] font-black text-[#404068] uppercase"
                            >
                                <span
                                    class="w-3 h-3 bg-[#404068] rounded-sm"
                                ></span>
                                Checked
                            </div>
                        </div>

                        <!-- Tools -->
                        <div
                            class="flex items-center gap-2 bg-slate-50 p-1.5 rounded-xl border border-slate-100"
                        >
                            <button
                                onclick="downloadImage()"
                                class="p-2 hover:bg-white hover:shadow-sm rounded-lg text-slate-500 transition-all group"
                                title="Download Image"
                            >
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    class="h-4 w-4"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke="currentColor"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        stroke-width="2"
                                        d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"
                                    />
                                </svg>
                            </button>
                            <button
                                onclick="toggleDataTable()"
                                class="p-2 hover:bg-white hover:shadow-sm rounded-lg text-slate-500 transition-all group"
                                title="Show Data Table"
                            >
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    class="h-4 w-4"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke="currentColor"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        stroke-width="2"
                                        d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
                                    />
                                </svg>
                            </button>
                            <button
                                onclick="downloadCSV()"
                                class="p-2 hover:bg-white hover:shadow-sm rounded-lg text-slate-500 transition-all group"
                                title="Download CSV"
                            >
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    class="h-4 w-4"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke="currentColor"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        stroke-width="2"
                                        d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
                                    />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="p-6 relative">
                    <!-- Data Table Overlay -->
                    <div
                        id="data-table-overlay"
                        class="hidden absolute inset-0 z-10 bg-white p-8 overflow-hidden flex flex-col"
                    >
                        <div class="flex justify-between items-center mb-6">
                            <h3
                                class="text-sm font-black text-[#404068] uppercase tracking-widest"
                            >
                                Reconciliation Data Log
                            </h3>
                            <button
                                onclick="toggleDataTable()"
                                class="p-2 hover:bg-slate-100 rounded-full"
                            >
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    class="h-5 w-5"
                                    viewBox="0 0 20 20"
                                    fill="currentColor"
                                >
                                    <path
                                        fill-rule="evenodd"
                                        d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
                                        clip-rule="evenodd"
                                    />
                                </svg>
                            </button>
                        </div>
                        <div
                            class="table-container border border-slate-100 rounded-xl"
                        >
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="bg-[#404068] text-white">
                                        <th
                                            class="px-6 py-4 text-[10px] font-black uppercase tracking-widest"
                                        >
                                            Period
                                        </th>
                                        <th
                                            class="px-6 py-4 text-[10px] font-black uppercase tracking-widest"
                                        >
                                            Check (kWh)
                                        </th>
                                        <th
                                            class="px-6 py-4 text-[10px] font-black uppercase tracking-widest"
                                        >
                                            Checked (kWh)
                                        </th>
                                        <th
                                            class="px-6 py-4 text-[10px] font-black uppercase tracking-widest"
                                        >
                                            Recovery
                                        </th>
                                    </tr>
                                </thead>
                                <tbody
                                    id="table-body"
                                    class="text-sm font-medium text-slate-600"
                                >
                                    <!-- Data injected here -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Main Chart -->
                    <div id="main-chart"></div>
                </div>
            </div>
        </main>

        <script>
            let myChart;
            let currentView = "monthly";
            let selectedMonthLabel = null;
            let selectedDayLabel = null;
            let lastGeneratedData = null;

            const labelToDateMap = {};

            const getChronologicalLabels = (type, contextLabel = null) => {
                let labels = [];
                const currentDate = new Date(2026, 3, 1);

                if (type === "monthly") {
                    for (let i = 11; i >= 0; i--) {
                        const d = new Date(2026, 3 - i, 1);
                        const label = d.toLocaleString("default", {
                            month: "short",
                            year: "2-digit",
                        });
                        labels.push(label);
                        labelToDateMap[label] = d;
                    }
                } else if (type === "daily") {
                    const baseDate =
                        labelToDateMap[contextLabel] || currentDate;
                    const year = baseDate.getFullYear();
                    const month = baseDate.getMonth();
                    const daysInMonth = new Date(year, month + 1, 0).getDate();

                    for (let i = 1; i <= daysInMonth; i++) {
                        const d = new Date(year, month, i);
                        const day = d.getDate().toString().padStart(2, "0");
                        const mon = d.toLocaleString("default", {
                            month: "short",
                        });
                        const yr = d.getFullYear().toString().slice(-2);
                        const label = `${day} ${mon} ${yr}`;
                        labels.push(label);
                        labelToDateMap[label] = d;
                    }
                } else {
                    for (let i = 0; i < 24; i++) {
                        labels.push(`${i.toString().padStart(2, "0")}:00`);
                    }
                }
                return labels;
            };

            const getData = (type, context = null) => {
                const labels = getChronologicalLabels(type, context);
                const count = labels.length;
                let baseVal =
                    type === "monthly" ? 160000 : type === "daily" ? 5000 : 220;

                const refData = [];
                const loadData = [];
                const rateData = [];

                for (let i = 0; i < count; i++) {
                    const noise = 1 + (Math.random() * 0.2 - 0.1);
                    const ref = Math.round(baseVal * noise);
                    const rate = 0.94 + Math.random() * 0.05;
                    const load = Math.round(ref * rate);

                    refData.push(ref);
                    loadData.push(load);
                    rateData.push((rate * 100).toFixed(2));
                }

                lastGeneratedData = { labels, refData, loadData, rateData };
                return lastGeneratedData;
            };

            function initChart() {
                const chartDom = document.getElementById("main-chart");
                if (!chartDom) return;
                myChart = echarts.init(chartDom);

                myChart.on("click", function (params) {
                    if (currentView === "monthly") {
                        selectedMonthLabel = params.name;
                        updateView("daily", selectedMonthLabel);
                    } else if (currentView === "daily") {
                        selectedDayLabel = params.name;
                        updateView("hourly", selectedDayLabel);
                    }
                });

                updateView("monthly");
            }

            function goBack() {
                if (currentView === "hourly") {
                    updateView("daily", selectedMonthLabel);
                } else if (currentView === "daily") {
                    updateView("monthly");
                }
            }

            function updateView(view, context = null) {
                currentView = view;

                // Close table if open
                document
                    .getElementById("data-table-overlay")
                    .classList.add("hidden");

                document.querySelectorAll(".btn-toggle").forEach((btn) => {
                    btn.classList.remove("active-toggle");
                    btn.classList.add("text-slate-400");
                });

                const activeBtn = document.getElementById(`btn-${view}`);
                if (activeBtn) {
                    activeBtn.classList.add("active-toggle");
                    activeBtn.classList.remove("text-slate-400");
                }

                const breadcrumb = document.getElementById(
                    "breadcrumb-container",
                );
                const breadcrumbText =
                    document.getElementById("breadcrumb-text");
                const title = document.getElementById("chart-title");
                const subtitle = document.getElementById("chart-subtitle");

                if (breadcrumb) {
                    if (view === "monthly") {
                        breadcrumb.classList.add("hidden");
                        if (title)
                            title.innerText = "Monthly Reconciliation Trend";
                        if (subtitle)
                            subtitle.innerText =
                                "Trailing 12 Months. Click a bar to view daily data.";
                    } else if (view === "daily") {
                        breadcrumb.classList.remove("hidden");
                        if (breadcrumbText)
                            breadcrumbText.innerText = "Back to Months";
                        if (title)
                            title.innerText = `Daily Breakdown: ${context}`;
                        if (subtitle)
                            subtitle.innerText =
                                "Click a bar to view hourly data.";
                    } else {
                        breadcrumb.classList.remove("hidden");
                        if (breadcrumbText)
                            breadcrumbText.innerText = "Back to Days";
                        if (title)
                            title.innerText = `Hourly Breakdown: ${context}`;
                        if (subtitle)
                            subtitle.innerText = "Detailed 24-hour analysis.";
                    }
                }

                const data = getData(view, context);
                const totalRef = data.refData.reduce((a, b) => a + b, 0);
                const totalLoad = data.loadData.reduce((a, b) => a + b, 0);
                const avgRate = ((totalLoad / totalRef) * 100).toFixed(1);

                document.getElementById("stat-ref").innerText =
                    totalRef.toLocaleString();
                document.getElementById("stat-load").innerText =
                    totalLoad.toLocaleString();
                document.getElementById("stat-rate").innerText = avgRate + "%";

                const option = {
                    tooltip: {
                        trigger: "axis",
                        axisPointer: { type: "shadow" },
                        backgroundColor: "#fff",
                        borderColor: "#e2e8f0",
                        borderWidth: 1,
                        formatter: (params) => {
                            if (!params || params.length < 2) return "";
                            const r = params[0].value;
                            const l = params[1].value;
                            const pct = params[2] ? params[2].value : 0;
                            return `
                            <div class="p-1">
                                <div class="font-black text-[10px] text-slate-400 uppercase mb-2">${params[0].axisValue}</div>
                                <div class="flex justify-between gap-8 mb-1">
                                    <span class="text-xs font-bold text-slate-500">Check:</span>
                                    <span class="text-xs font-mono font-black">${r.toLocaleString()}</span>
                                </div>
                                <div class="flex justify-between gap-8 mb-2">
                                    <span class="text-xs font-bold text-[#404068]">Checked:</span>
                                    <span class="text-xs font-mono font-black">${l.toLocaleString()}</span>
                                </div>
                                <div class="bg-slate-900 text-white p-2 rounded-lg flex justify-between items-center">
                                    <span class="text-[9px] font-black uppercase tracking-tighter">Recov:</span>
                                    <span class="text-sm font-black text-emerald-400">${pct}%</span>
                                </div>
                            </div>
                        `;
                        },
                        extraCssText:
                            "box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border-radius: 12px;",
                    },
                    grid: {
                        top: "10%",
                        left: "3%",
                        right: "3%",
                        bottom: "15%",
                        containLabel: true,
                    },
                    dataZoom: [
                        {
                            type: "slider",
                            show: view !== "hourly",
                            start: view === "daily" ? 70 : 0,
                            end: 100,
                            height: 20,
                            bottom: 10,
                            borderColor: "transparent",
                            backgroundColor: "#f1f5f9",
                            fillerColor: "rgba(64, 64, 104, 0.1)",
                        },
                        { type: "inside" },
                    ],
                    xAxis: {
                        type: "category",
                        data: data.labels,
                        axisLine: { lineStyle: { color: "#f1f5f9" } },
                        axisTick: { show: false },
                        axisLabel: {
                            color: "#94a3b8",
                            fontStyle: "normal",
                            fontWeight: 700,
                            fontSize: 10,
                            margin: 15,
                        },
                    },
                    yAxis: [
                        {
                            type: "value",
                            splitLine: { lineStyle: { color: "#f8fafc" } },
                            axisLabel: {
                                color: "#475569",
                                fontWeight: 900,
                                fontSize: 11,
                            },
                        },
                        {
                            type: "value",
                            min: 90,
                            max: 101,
                            position: "right",
                            splitLine: { show: false },
                            axisLabel: {
                                color: "#404068",
                                fontWeight: 800,
                                formatter: "{value}%",
                            },
                        },
                    ],
                    series: [
                        {
                            name: "Check",
                            type: "bar",
                            data: data.refData,
                            itemStyle: {
                                color: "#e2e8f0",
                                borderRadius: [4, 4, 0, 0],
                            },
                            barMaxWidth: view === "hourly" ? 20 : 35,
                            emphasis: {
                                itemStyle: { color: "#cbd5e1" },
                                cursor:
                                    view !== "hourly" ? "pointer" : "default",
                            },
                        },
                        {
                            name: "Checked",
                            type: "bar",
                            data: data.loadData,
                            itemStyle: {
                                color: "#404068",
                                borderRadius: [4, 4, 0, 0],
                            },
                            barMaxWidth: view === "hourly" ? 20 : 35,
                            emphasis: {
                                itemStyle: { color: "#2d2d4d" },
                                cursor:
                                    view !== "hourly" ? "pointer" : "default",
                            },
                        },
                        {
                            name: "Recovery %",
                            type: "line",
                            yAxisIndex: 1,
                            data: data.rateData,
                            smooth: true,
                            showSymbol: false,
                            lineStyle: { width: 3, color: "#f43f5e" },
                        },
                    ],
                };
                myChart.setOption(option, true);
            }

            // TOOL FUNCTIONS
            function toggleDataTable() {
                const overlay = document.getElementById("data-table-overlay");
                const tbody = document.getElementById("table-body");

                if (overlay.classList.contains("hidden")) {
                    // Populate table
                    tbody.innerHTML = lastGeneratedData.labels
                        .map(
                            (label, i) => `
                    <tr class="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4 font-bold text-slate-900">${label}</td>
                        <td class="px-6 py-4 font-mono">${lastGeneratedData.refData[i].toLocaleString()}</td>
                        <td class="px-6 py-4 font-mono">${lastGeneratedData.loadData[i].toLocaleString()}</td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-1 rounded text-[10px] font-black ${lastGeneratedData.rateData[i] < 96 ? "bg-rose-100 text-rose-600" : "bg-emerald-100 text-emerald-600"}">
                                ${lastGeneratedData.rateData[i]}%
                            </span>
                        </td>
                    </tr>
                `,
                        )
                        .join("");
                    overlay.classList.remove("hidden");
                } else {
                    overlay.classList.add("hidden");
                }
            }

            function downloadImage() {
                if (!myChart) return;
                const url = myChart.getDataURL({
                    type: "png",
                    pixelRatio: 2,
                    backgroundColor: "#fff",
                });
                const link = document.createElement("a");
                link.download = `recon_chart_${currentView}_${new Date().getTime()}.png`;
                link.href = url;
                link.click();
            }

            function downloadCSV() {
                if (!lastGeneratedData) return;

                let csvContent =
                    "Period,Check (kWh),Checked (kWh),Recovery Rate (%)\n";
                lastGeneratedData.labels.forEach((label, i) => {
                    csvContent += `${label},${lastGeneratedData.refData[i]},${lastGeneratedData.loadData[i]},${lastGeneratedData.rateData[i]}\n`;
                });

                const blob = new Blob([csvContent], {
                    type: "text/csv;charset=utf-8;",
                });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute(
                    "download",
                    `utility_recon_${currentView}_export.csv`,
                );
                link.style.visibility = "hidden";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }

            window.onload = initChart;
            window.onresize = () => myChart && myChart.resize();
        </script>
