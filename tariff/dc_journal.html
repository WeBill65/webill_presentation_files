<!doctype html>
<html lang="en" data-theme="light">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tariff Rate Journal</title>
        <!-- Tailwind and DaisyUI -->
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css"
            rel="stylesheet"
            type="text/css"
        />
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            /* Custom styles to match the required hex codes precisely */
            .bg-custom-navy {
                background-color: #404068;
            }
            .text-custom-orange {
                color: #faa919;
            }
            .focus-ring-custom:focus {
                --tw-ring-color: #faa919;
            }
            .border-custom-navy:focus {
                border-color: #404068;
            }

            /* Custom scrollbar for the table container */
            .custom-scrollbar::-webkit-scrollbar {
                width: 8px;
                height: 8px;
            }
            .custom-scrollbar::-webkit-scrollbar-track {
                background: #f1f1f1;
            }
            .custom-scrollbar::-webkit-scrollbar-thumb {
                background: #404068;
                border-radius: 4px;
            }
            .custom-scrollbar::-webkit-scrollbar-thumb:hover {
                background: #2d2d4a;
            }

            /* Ensure sticky header works correctly */
            .sticky-header {
                position: sticky;
                top: 0;
                z-index: 20;
            }

            /* Group Header Sticky */
            .group-header {
                position: sticky;
                top: 52px; /* Adjusted based on header height */
                z-index: 10;
            }

            /* Table Width Optimization */
            table {
                table-layout: auto;
                width: 100%;
            }

            /* Allow multi-line wrapping for specific columns */
            .cell-wrap {
                white-space: normal;
                word-wrap: break-word;
                min-width: 250px;
            }

            .cell-shrink {
                white-space: nowrap;
                width: 1%;
            }

            /* Animation for successful save */
            @keyframes fadeOut {
                from {
                    opacity: 1;
                    transform: translateY(0);
                }
                to {
                    opacity: 0;
                    transform: translateY(-10px);
                }
            }
            .row-removing {
                animation: fadeOut 0.4s forwards;
            }
        </style>
    </head>
    <body
        class="min-h-screen bg-gray-50 font-sans text-gray-900 overflow-x-hidden"
    >
        <!-- Header Section -->
        <header class="p-4 md:p-6 shadow-md bg-custom-navy">
            <div
                class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-center gap-4"
            >
                <div class="flex items-center gap-4 w-full md:w-auto">
                    <a href="journals.html"
                       class="btn btn-sm bg-white/10 hover:bg-white/20 text-white border-white/20 gap-2 shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                        </svg>
                        Back
                    </a>
                    <div>
                        <h1
                            class="text-2xl md:text-3xl font-bold text-custom-orange leading-tight"
                            id="tariff-name"
                        >
                            Standard Utility Tariff 2024
                        </h1>
                        <p class="text-xs md:text-sm opacity-90 text-white mt-1">
                            Capturing system-wide permutated rates for journaling.
                        </p>
                    </div>
                </div>

                <!-- Filter Dropdown (DaisyUI Select) -->
                <div class="form-control w-full md:w-72">
                    <label class="label py-1">
                        <span
                            class="label-text text-[10px] uppercase tracking-wider text-white opacity-70"
                            >Filter by Charge Group</span
                        >
                    </label>
                    <select
                        id="filter-select"
                        class="select select-bordered select-sm md:select-md w-full bg-white text-gray-800 font-semibold focus:outline-none focus:border-custom-orange"
                    >
                        <option value="">All Charge Groups</option>
                        <!-- Options injected by JavaScript -->
                    </select>
                </div>
            </div>
        </header>

        <!-- Main Table Section -->
        <main class="max-w-[1400px] mx-auto p-3 md:p-6 mt-2 md:mt-4">
            <div
                class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col"
            >
                <!-- Scrollable Container -->
                <div
                    class="overflow-x-auto overflow-y-auto max-h-[70vh] md:max-h-[700px] custom-scrollbar"
                >
                    <table
                        class="w-full text-left border-separate border-spacing-0"
                    >
                        <thead>
                            <tr class="bg-custom-navy">
                                <th
                                    id="sort-charge"
                                    class="sticky-header p-3 md:p-4 text-white font-semibold cursor-pointer hover:bg-[#4d4d7a] transition-colors group bg-custom-navy border-b border-gray-700 whitespace-nowrap"
                                >
                                    <div
                                        class="flex items-center gap-2 text-xs uppercase tracking-wider"
                                    >
                                        Charge Group
                                        <span id="sort-icon">
                                            <svg
                                                xmlns="http://www.w3.org/2000/svg"
                                                width="14"
                                                height="14"
                                                viewBox="0 0 24 24"
                                                fill="none"
                                                stroke="currentColor"
                                                stroke-width="2"
                                                stroke-linecap="round"
                                                stroke-linejoin="round"
                                            >
                                                <path d="m18 15-6-6-6 6" />
                                            </svg>
                                        </span>
                                    </div>
                                </th>
                                <th
                                    class="sticky-header p-3 md:p-4 text-white font-semibold bg-custom-navy border-b border-gray-700 cell-shrink text-xs uppercase tracking-wider"
                                >
                                    Permutation
                                </th>
                                <th
                                    class="sticky-header p-3 md:p-4 text-white font-semibold bg-custom-navy border-b border-gray-700 text-xs uppercase tracking-wider"
                                >
                                    Description
                                </th>
                                <th
                                    class="sticky-header p-3 md:p-4 text-white font-semibold bg-custom-navy border-b border-gray-700 cell-shrink text-right text-xs uppercase tracking-wider"
                                >
                                    Journal Rate
                                </th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y divide-gray-100">
                            <!-- Rows injected by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>

            <footer
                class="mt-6 text-xs md:text-sm text-gray-500 flex flex-col md:flex-row justify-between items-center gap-4 px-2"
            >
                <p id="counter-text" class="order-2 md:order-1">
                    Total pending entries: 0
                </p>
                <div
                    class="flex gap-4 order-1 md:order-2 bg-white px-4 py-2 rounded-full shadow-sm border border-gray-100"
                >
                    <span class="flex items-center gap-2">
                        <div
                            class="w-3 h-3 bg-green-500 rounded-full animate-pulse"
                        ></div>
                        <span
                            class="font-medium text-gray-700 text-[10px] uppercase tracking-wider"
                            >Validation Engine Active</span
                        >
                    </span>
                </div>
            </footer>
        </main>

        <script>
            // Initial Data
            let rates = [
                {
                    id: 1,
                    charge: "Energy Usage",
                    index: "001",
                    season: "Summer",
                    tou: "Peak",
                    description:
                        "Standard Energy Usage rate applied during peak demand hours in the summer season.",
                    qualifier: "Residential",
                    step: "1",
                    denomination: "kWh",
                    rate: "",
                },
                {
                    id: 2,
                    charge: "Energy Usage",
                    index: "001",
                    season: "Summer",
                    tou: "Off-Peak",
                    description:
                        "Standard Off-Peak rate for energy consumption during low-demand night hours.",
                    qualifier: "Residential",
                    step: "1",
                    denomination: "kWh",
                    rate: "",
                },
                {
                    id: 3,
                    charge: "Fixed Charge",
                    index: "002",
                    season: "Annual",
                    tou: "N/A",
                    description:
                        "Recurring monthly network access and availability fee for small business customers.",
                    qualifier: "Commercial",
                    step: "0",
                    denomination: "Month",
                    rate: "",
                },
                {
                    id: 4,
                    charge: "Demand Charge",
                    index: "003",
                    season: "Winter",
                    tou: "Peak",
                    description:
                        "Maximum demand recorded during winter peak windows, calculated on the highest 15-minute interval.",
                    qualifier: "Industrial",
                    step: "1",
                    denomination: "kVA",
                    rate: "",
                },
                {
                    id: 5,
                    charge: "Energy Usage",
                    index: "001",
                    season: "Winter",
                    tou: "Peak",
                    description:
                        "Winter-specific peak energy consumption rate for high-demand periods.",
                    qualifier: "Residential",
                    step: "1",
                    denomination: "kWh",
                    rate: "",
                },
                {
                    id: 6,
                    charge: "Environmental Levy",
                    index: "009",
                    season: "Annual",
                    tou: "N/A",
                    description:
                        "Mandatory green energy contribution fund supporting renewable grid integration projects.",
                    qualifier: "All",
                    step: "0",
                    denomination: "kWh",
                    rate: "",
                },
                {
                    id: 7,
                    charge: "Service Charge",
                    index: "004",
                    season: "Annual",
                    tou: "N/A",
                    description:
                        "Basic daily service fee for maintaining infrastructure and metering equipment.",
                    qualifier: "Residential",
                    step: "0",
                    denomination: "Day",
                    rate: "",
                },
                {
                    id: 8,
                    charge: "Energy Usage",
                    index: "001",
                    season: "Summer",
                    tou: "Standard",
                    description:
                        "Standard mid-day energy rate applicable between peak and off-peak transition zones.",
                    qualifier: "Residential",
                    step: "1",
                    denomination: "kWh",
                    rate: "",
                },
                {
                    id: 9,
                    charge: "Demand Charge",
                    index: "003",
                    season: "Summer",
                    tou: "Peak",
                    description:
                        "Summer peak demand calculation based on maximum coincident power throughput.",
                    qualifier: "Industrial",
                    step: "1",
                    denomination: "kVA",
                    rate: "",
                },
                {
                    id: 10,
                    charge: "Reactive Energy",
                    index: "005",
                    season: "Annual",
                    tou: "N/A",
                    description:
                        "Penalty rate for reactive power usage falling below the required power factor threshold.",
                    qualifier: "Industrial",
                    step: "0",
                    denomination: "kVArh",
                    rate: "",
                },
                {
                    id: 11,
                    charge: "Transmission",
                    index: "006",
                    season: "Winter",
                    tou: "All",
                    description:
                        "Grid transmission and distribution loss adjustment factor applied to all winter kWh.",
                    qualifier: "All",
                    step: "0",
                    denomination: "kWh",
                    rate: "",
                },
                {
                    id: 12,
                    charge: "Energy Usage",
                    index: "001",
                    season: "Winter",
                    tou: "Off-Peak",
                    description:
                        "Winter night-time energy consumption rate for heating and thermal storage usage.",
                    qualifier: "Residential",
                    step: "1",
                    denomination: "kWh",
                    rate: "",
                },
                {
                    id: 13,
                    charge: "Fixed Charge",
                    index: "002",
                    season: "Annual",
                    tou: "N/A",
                    description:
                        "Small commercial capacity access charge based on standard transformer sizing.",
                    qualifier: "Commercial",
                    step: "0",
                    denomination: "Month",
                    rate: "",
                },
                {
                    id: 14,
                    charge: "Energy Usage",
                    index: "001",
                    season: "Annual",
                    tou: "All",
                    description:
                        "Flat energy rate for rural areas where time-of-use metering is not currently deployed.",
                    qualifier: "Rural",
                    step: "1",
                    denomination: "kWh",
                    rate: "",
                },
                {
                    id: 15,
                    charge: "System Access",
                    index: "007",
                    season: "Annual",
                    tou: "N/A",
                    description:
                        "Administrative system processing and billing service fee per account per month.",
                    qualifier: "All",
                    step: "0",
                    denomination: "Month",
                    rate: "",
                },
            ];

            let selectedCharge = "";
            let sortOrder = "asc";

            const tableBody = document.getElementById("table-body");
            const filterSelect = document.getElementById("filter-select");
            const sortBtn = document.getElementById("sort-charge");
            const sortIcon = document.getElementById("sort-icon");
            const counterText = document.getElementById("counter-text");

            function populateFilter() {
                const uniqueCharges = [
                    ...new Set(rates.map((r) => r.charge)),
                ].sort();
                const currentVal = filterSelect.value;

                filterSelect.innerHTML =
                    '<option value="">All Charge Groups</option>';
                uniqueCharges.forEach((charge) => {
                    const opt = document.createElement("option");
                    opt.value = charge;
                    opt.textContent = charge;
                    filterSelect.appendChild(opt);
                });

                if (uniqueCharges.includes(currentVal)) {
                    filterSelect.value = currentVal;
                } else {
                    selectedCharge = "";
                    filterSelect.value = "";
                }
            }

            function render() {
                let filtered = rates.filter(
                    (item) =>
                        selectedCharge === "" || item.charge === selectedCharge,
                );

                filtered.sort((a, b) => {
                    const comparison = a.charge.localeCompare(b.charge);
                    return sortOrder === "asc" ? comparison : -comparison;
                });

                tableBody.innerHTML = "";

                if (filtered.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="4" class="p-12 text-center text-gray-400 italic">No pending rates to display. All charges journaled.</td></tr>`;
                } else {
                    let currentGroup = null;

                    filtered.forEach((row) => {
                        if (row.charge !== currentGroup) {
                            currentGroup = row.charge;
                            const groupRates = filtered.filter(
                                (r) => r.charge === currentGroup,
                            );
                            const isGroupComplete = groupRates.every(
                                (r) =>
                                    r.rate !== "" && !isNaN(parseFloat(r.rate)),
                            );

                            const groupRow = document.createElement("tr");
                            groupRow.className =
                                "group-header bg-gray-50 border-y border-gray-200 shadow-sm";
                            groupRow.innerHTML = `
                            <td colspan="4" class="p-2 md:p-3">
                                <div class="flex items-center justify-between">
                                    <div class="flex items-center gap-2 text-xs font-bold uppercase tracking-widest text-[#404068]">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m19 9-7 7-7-7"/></svg>
                                        ${currentGroup}
                                        <span class="ml-2 px-2 py-0.5 rounded bg-gray-200 text-gray-500 font-normal normal-case tracking-normal">${groupRates.length} permutations</span>
                                    </div>
                                    <button
                                        onclick="saveGroup('${currentGroup.replace(/'/g, "\\'")}')"
                                        class="btn btn-xs md:btn-sm font-bold shadow-md
                                        ${isGroupComplete ? "bg-green-600 hover:bg-green-700 text-white" : "btn-disabled opacity-50"}"
                                        ${!isGroupComplete ? "disabled" : ""}
                                    >
                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                                        Confirm & Save
                                    </button>
                                </div>
                            </td>`;
                            tableBody.appendChild(groupRow);
                        }

                        // Compact Permutation Logic
                        let permutationHtml = `<div class="font-bold text-gray-800">${row.season} / ${row.tou}</div>`;
                        if (row.step && row.step !== "0") {
                            permutationHtml += `<div class="text-xs text-gray-500">Step ${row.step}</div>`;
                        }
                        if (
                            row.qualifier &&
                            row.qualifier !== "All" &&
                            row.qualifier !== "N/A"
                        ) {
                            permutationHtml += `<div class="text-[11px] text-custom-navy/70 italic">${row.qualifier}</div>`;
                        }

                        const tr = document.createElement("tr");
                        tr.className =
                            "hover:bg-blue-50/20 transition-colors bg-white";
                        tr.dataset.group = row.charge;
                        tr.innerHTML = `
                        <td class="p-3 md:p-4 text-gray-300 italic text-[10px] border-b border-gray-100 cell-shrink">Item</td>
                        <td class="p-3 md:p-4 border-b border-gray-100 cell-shrink text-sm leading-tight">${permutationHtml}</td>
                        <td class="p-3 md:p-4 text-gray-600 text-sm border-b border-gray-100 cell-wrap leading-relaxed">${row.description}</td>
                        <td class="p-3 md:p-4 border-b border-gray-100 cell-shrink text-right">
                            <div class="inline-flex flex-col items-end">
                                <input
                                    type="text"
                                    inputmode="decimal"
                                    placeholder="0.0000"
                                    value="${row.rate}"
                                    class="rate-input input input-bordered input-sm w-28 md:w-36 focus:border-custom-navy focus:ring-0 text-right text-sm md:text-base font-mono bg-gray-50/30"
                                    data-id="${row.id}"
                                />
                                <div class="text-[10px] uppercase text-gray-400 mt-1 font-semibold tracking-tighter">
                                    ${row.index} | ${row.denomination}
                                </div>
                            </div>
                        </td>`;
                        tableBody.appendChild(tr);
                    });
                }

                counterText.textContent = `Total pending entries: ${filtered.length}`;
            }

            function saveGroup(chargeName) {
                const rows = document.querySelectorAll(
                    `tr[data-group="${chargeName}"]`,
                );
                rows.forEach((row) => row.classList.add("row-removing"));

                setTimeout(() => {
                    rates = rates.filter((r) => r.charge !== chargeName);
                    populateFilter();
                    render();
                }, 400);
            }

            filterSelect.addEventListener("change", (e) => {
                selectedCharge = e.target.value;
                render();
            });

            sortBtn.addEventListener("click", () => {
                sortOrder = sortOrder === "asc" ? "desc" : "asc";
                render();
            });

            tableBody.addEventListener("input", (e) => {
                if (e.target.classList.contains("rate-input")) {
                    const id = parseInt(e.target.dataset.id);
                    if (isNaN(id)) return;

                    const val = e.target.value
                        .replace(/[^0-9.]/g, "")
                        .replace(/(\..*?)\..*/g, "$1");

                    const cursorPosition = e.target.selectionStart;
                    const rateIndex = rates.findIndex((r) => r.id === id);

                    if (rateIndex !== -1) {
                        rates[rateIndex].rate = val;

                        // We check if the group is now valid
                        const group = rates[rateIndex].charge;
                        const groupRates = rates.filter(
                            (r) => r.charge === group,
                        );
                        const isNowComplete = groupRates.every(
                            (r) => r.rate !== "" && !isNaN(parseFloat(r.rate)),
                        );

                        // Render to update group save button
                        render();

                        // Maintain focus and cursor position
                        const refocus = document.querySelector(
                            `input[data-id="${id}"]`,
                        );
                        if (refocus) {
                            refocus.focus();
                            refocus.setSelectionRange(
                                cursorPosition,
                                cursorPosition,
                            );
                        }
                    }
                }
            });

            window.onload = () => {
                populateFilter();
                render();
            };
        </script>
    
    <!-- Home Button -->
    <a href="../index.html" title="Home" style="position:fixed;bottom:1.25rem;right:1.25rem;z-index:9999;background-color:#404068;color:#faa919;border-radius:50%;width:2.75rem;height:2.75rem;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,0.25);text-decoration:none;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </a>
</body>
</html>
